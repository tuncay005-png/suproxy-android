kind = "mobile"
previewPath = "/suproxy/"
title = "SuProxy"
version = "1.0.0"
id = "artifacts/suproxy"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/suproxy/" ]
localPort = 20983

[services.development]
run = "pnpm --filter @workspace/suproxy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/suproxy", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/suproxy", "run", "serve" ]

[services.env]
PORT = "20983"
BASE_PATH = "/suproxy/"
