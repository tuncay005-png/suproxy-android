name: Build SuProxy APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Install dependencies
        working-directory: artifacts/suproxy
        run: pnpm install --no-frozen-lockfile

      - name: Prebuild Android project
        working-directory: artifacts/suproxy
        run: pnpm exec expo prebuild --platform android

      - name: Install dependencies again (after prebuild)
        working-directory: artifacts/suproxy
        run: pnpm install --no-frozen-lockfile

      - name: Grant execute permission for gradlew
        working-directory: artifacts/suproxy/android
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: artifacts/suproxy/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SuProxy-release
          path: artifacts/suproxy/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
