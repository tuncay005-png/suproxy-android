name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install dependencies
        working-directory: artifacts/suproxy
        run: pnpm install --no-frozen-lockfile

      - name: Prebuild (generate native Android project)
        working-directory: artifacts/suproxy
        run: pnpm exec expo prebuild --platform android --clean --no-install

      - name: Make gradlew executable
        working-directory: artifacts/suproxy/android
        run: chmod +x gradlew

      - name: Build APK
        working-directory: artifacts/suproxy/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: suproxy-apk
          path: artifacts/suproxy/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
